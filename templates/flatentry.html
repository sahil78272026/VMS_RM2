<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flat Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0d2b66, #123d8c); /* Dark royal blue gradient */
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    /* 📦 Card Box */
    .form-box {
      background: #e6f0ff; /* Light royal blue */
      max-width: 800px;
      margin: 40px auto;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      overflow: hidden;
      border: 1px solid #c8dcff;
    }

    /* 🔵 Header inside card */
    .form-header {
      background: #1d4ed8; /* Royal blue */
      color: #fff;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 15px;
      letter-spacing: 0.5px;
    }

    .form-content {
      padding: 25px;
    }

    /* 🏷 Subtitle */
    .form-subtitle {
      text-align: center;
      font-size: 1.1rem;
      color: #2c4a86;
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* Inputs */
    .form-label {
      color: #0d3a7a;
      font-weight: 500;
    }
    .form-control {
      border: 1px solid #a8c8ff;
      border-radius: 8px;
      background: #fff;
      transition: 0.3s;
    }
    .form-control:focus {
      border-color: #1d4ed8;
      box-shadow: 0 0 8px rgba(29,78,216,0.3);
      outline: none;
    }

    /* 🔘 Button */
    .btn-blue {
      background: #1d4ed8;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 1rem;
      font-weight: 500;
      width: 30%;
      border-radius: 8px;
      transition: 0.3s ease;
      margin:10px;
    }
    .btn-blue:hover {
      background: #153ea6;
      transform: scale(1.03);
    }

    /* 📋 Table styling */
    .table-container {
      margin-top: 25px;
    }
    .table thead {
      background: #1d4ed8;
      color: #fff;
      text-align: center;
    }
    .table tbody tr:hover {
      background: #dbeafe;
    }
  </style>
</head>
<body>

  <div class="form-box">

    <!-- Header -->
    <div class="form-header">
      🏢 Flat Register
    </div>

    <div class="form-content">

      <div class="form-subtitle">
        Register New Flats & View Existing Records
      </div>

      <!-- ✅ Form Section -->
      <form action="/flatentry" method="POST" class="row g-3">
        <div class="col-md-6">
          <label for="fnum" class="form-label">Flat Number</label>
          <select class="form-select" name="fnum" id="fnum" required>
            <option value="">Select Flat</option>
          </select>

        </div>

        <div class="col-md-6">
          <label for="fowner" class="form-label">Owner Name</label>
          <input type="text" class="form-control" name="fowner" id="fowner" placeholder="Enter owner name" required>
        </div>

        <div class="col-12">
          <button type="submit" name="action" value="add" class="btn-blue">Add Flat Information </button>
          <button type="submit" name="action" value="delete" class="btn-blue">Delete Flat Information</button>
          <button type="submit" name="action" value="update" class="btn-blue">Update Flat Information </button>
        </div>
      </form>

      <!-- ✅ Table Section -->
      <div class="table-container">
        <h5 class="text-center mt-4">📋 Registered Flats</h5>
        <table class="table table-bordered table-striped mt-3">
          <thead>
            <tr>
              <th>Sno</th>
              <th>Flat Number</th>
              <th>Owner Name</th>
            </tr>
          </thead>
          <tbody>
            {% for record in allrecord %}
            <tr>
              <td>{{ loop.index }}</td>
              <td>{{ record.fnum }}</td>
              <td>{{ record.fowner }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

    </div>
  </div>

<script>
  async function loadFlats() {
    const response = await fetch('/api/flats');
    const flats = await response.json();

    const flatSelect = document.getElementById('fnum');
    flatSelect.innerHTML = '<option value="">Select Flat</option>';

    flats.forEach(flat => {
      const option = document.createElement('option');
      option.value = flat.fnum;  // or flat.id depending on your DB
      option.textContent = flat.fnum;  // the actual flat number
      flatSelect.appendChild(option);
    });
  }

  // Load flats when page loads
  document.addEventListener('DOMContentLoaded', loadFlats);
</script>

</body>
</html>
