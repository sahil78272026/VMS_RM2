<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gatekeeper Guard Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0d2b66, #123d8c); /* Dark royal blue gradient */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: #e6f0ff; /* Light royal blue card */
      padding: 35px 40px;
      border-radius: 15px;
      width: 380px;
      text-align: center;
      border: 1px solid #bcd4ff; /* Soft blue border */
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    .login-header {
      background: #1d4ed8; /* Royal blue header */
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .sub-title {
      font-size: 14px;
      margin-bottom: 20px;
      color: #2c4a86;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #a8c8ff;
      background: #fff;
      transition: 0.3s;
      color: #333;
    }

    .form-control:focus {
      border-color: #1d4ed8;
      box-shadow: 0 0 8px rgba(29,78,216,0.3);
      outline: none;
    }

    .btn-login {
      background: #1d4ed8; /* Royal blue button */
      color: #fff;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s ease;
    }
    .btn-login:hover {
      background: #153ea6; /* Slightly darker royal */
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <form class="login-card" action="/glogin" method="POST">
    <div class="login-header">🏰 Guard Login</div>
    <div class="sub-title">Secure Guard Access Panel</div>

    <input type="text" class="form-control" name="guname" placeholder="Guard Username" required>
    <input type="password" class="form-control" name="gpw" placeholder="Password" required>

    <button type="submit" class="btn-login">
      <i class="fas fa-lock"></i> Login
    </button>
  </form>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>

</body>
</html>
