<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resident Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container mt-5">
    <h2 class="text-center mb-3">Resident Registration</h2>
    <form method="POST" class="card p-4 shadow-sm">
      <input type="text" name="name" placeholder="Full Name" class="form-control mb-3" required>
      <input type="text" name="mobile" placeholder="Mobile Number" class="form-control mb-3" required>
      <input type="email" name="email" placeholder="Email (optional)" class="form-control mb-3">
      <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

      <select name="flat_id" class="form-select mb-3" required>
        <option value="">Select Flat</option>
        {% for flat in flats %}
          <option value="{{ flat.id }}">{{ flat.fnum }} - {{ flat.fowner }}</option>
        {% endfor %}
      </select>

      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
  </div>
</body>
</html>
