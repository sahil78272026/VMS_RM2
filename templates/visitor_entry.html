<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visitor Entry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body class="bg-light p-4">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h3 class="text-center mb-4">Visitor Entry Form</h3>

            <form action="/visitor-entry" method="POST">

              <!-- Visitor Name -->
              <div class="mb-3">
                <label for="vname" class="form-label">Visitor Name</label>
                <input type="text" class="form-control" id="vname" name="vname" required>
              </div>

              <!-- Purpose / Work -->
              <div class="mb-3">
                <label for="vwork" class="form-label">Purpose of Visit</label>
                <input type="text" class="form-control" id="vwork" name="vwork" required>
              </div>

              <!-- Flat Selection -->
              <div class="mb-3">
                <label for="vfnum" class="form-label">Flat Number</label>
                <select name="vfnum" id="vfnum" class="form-select" required>
                  <option value="">Select Flat</option>
                  {% for flat in flats %}
                    <option value="{{ flat.fnum }}">{{ flat.fnum }} - {{ flat.fowner }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Owner Name (Auto-filled optional) -->
              <div class="mb-3">
                <label for="vfowner" class="form-label">Owner Name</label>
                <input type="text" class="form-control" id="vfowner" name="vfowner" required>
              </div>

              <!-- Submit Button -->
              <button type="submit" class="btn btn-primary w-100">Submit Visitor Info</button>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
