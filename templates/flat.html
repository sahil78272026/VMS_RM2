<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visitor Permission</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #3b6cc4, #6ea8fe); /* Royal blue gradient */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }
    .card {
      background: #e6f0ff; /* Light royal blue card */
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      border: 1px solid #c8dcff;
    }
    .card-header {
      background: #1d4ed8; /* Deep royal blue */
      color: #fff;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      border-radius: 1rem 1rem 0 0;
      letter-spacing: 0.5px;
    }
    .form-floating label {
      color: #0d3a7a;
    }
    .form-control {
      border: 1px solid #b5cffd;
      background: #fff;
      color: #333;
    }
    .btn-custom {
      width: 100%;
      margin-top: 0.5rem;
      background: #1d4ed8; /* Royal blue button */
      color: white;
      font-weight: 500;
      transition: 0.3s ease;
    }
    .btn-custom:hover {
      background: #153ea6; /* Slightly darker royal blue */
    }
    hr {
      border-top: 1px solid #bcd4ff;
    }
    .text-muted {
      color: #3b4f7a !important;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      
      <!-- Card Container -->
      <div class="card">
        <div class="card-header">
          🏡 Visitor Permission Form
        </div>
        <div class="card-body p-4">
          
          <p class="text-muted text-center">Response by Owner</p>
          
          <!-- Form -->
          <form id="myForm" method="POST">
            
            <!-- Flat Number -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" name="fn" id="fn" placeholder="Flat Number" value="{{flat.fnum}}" required>
              <label for="fn">Flat Number</label>
            </div>

            <!-- Flat Owner -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" name="fo" id="fo" placeholder="Flat Owner" value="{{flat.fowner}}" required>
              <label for="fo">Flat Owner</label>
            </div>

            <!-- Visitor Name -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" name="vn" id="vn" placeholder="Visitor Name" value="{{vn}}" required>
              <label for="vn">Visitor Name</label>
            </div>

            <!-- Visitor Work -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" name="vw" id="vw" placeholder="Visitor Work" value="{{vw}}" required>
              <label for="vw">Visitor Work</label>
            </div>

            <!-- Divider -->
            <hr class="my-4">

            <!-- Owner Response -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" name="ans" id="a" placeholder="Owner Response">
              <label for="a">Owner Response</label>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-custom" 
                    formaction="/result" formmethod="POST">
              <i class="fas fa-check-circle"></i> Give Your Permission
            </button>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
