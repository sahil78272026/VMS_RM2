<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visitor Entry Check Form</title>

  <!-- Bootstrap for consistency -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f0f6ff; /* soft background */
      font-family: Arial, sans-serif;
    }

    .card-box {
      background: #fff;
      max-width: 450px;
      margin: 80px auto;
      border-radius: 12px;
      border: 2px solid #007bff; /* blue border */
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    /* Dark Blue Header */
    .form-header {
      background: #003366; /* Royal Blue */
      color: #fff;
      text-align: center;
      padding: 20px;
      border-radius: 10px 10px 0 0;
    }
    .form-header h2 {
      margin: 0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-header p {
      margin: 5px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    /* Form Content */
    .form-content {
      padding: 25px 30px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
    }

    .form-control {
      border-radius: 8px;
      border: 1px solid #007bff;
      transition: 0.3s;
    }
    .form-control:focus {
      border-color: #0056b3;
      box-shadow: 0 0 8px rgba(0,123,255,0.3);
    }

    /* Submit Button */
    .btn-primary {
      background: #007bff;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn-primary:hover {
      background: #0056b3;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card-box">

    <!-- Dark Blue Header -->
    <div class="form-header">
      <h2>Visitor Entry Check</h2>
      <p>Gatekeeper Checking Portal</p>
    </div>

    <!-- Form -->
    <div class="form-content">
      <form action="/check" method="POST">

        <div class="mb-3">
          <label for="vn" class="form-label">Visitor Name</label>
          <input type="text" class="form-control" name="vn" id="vn" placeholder="Enter visitor name">
        </div>

        <div class="mb-3">
          <label for="vw" class="form-label">Visitor Work</label>
          <input type="text" class="form-control" name="vw" id="vw" placeholder="Purpose of visit">
        </div>

        <div class="col-md-6">
          <label for="fnum" class="form-label">Flat Number</label>
          <select class="form-select" name="fnum" id="fnum" required>
            <option value="">Select Flat</option>
          </select>

        </div>
        <br>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </div>
</div>
<script>
  async function loadFlats() {
    const response = await fetch('/api/flats');
    const flats = await response.json();

    const flatSelect = document.getElementById('fnum');
    flatSelect.innerHTML = '<option value="">Select Flat</option>';

    flats.forEach(flat => {
      const option = document.createElement('option');
      option.value = flat.fnum;  // or flat.id depending on your DB
      option.textContent = flat.fnum;  // the actual flat number
      flatSelect.appendChild(option);
    });
  }

  // Load flats when page loads
  document.addEventListener('DOMContentLoaded', loadFlats);
</script>
</body>
</html>
