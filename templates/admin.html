<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Visitor Management System</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #3b6cc4, #6ea8fe); /* Light royal blue gradient */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #dff3ff; /* Light sky blue card */
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      width: 350px;
      text-align: center;
      border: 1px solid #c8e6ff;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #0b3d91; /* Royal blue heading */
      font-size: 26px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-box input[type="text"],
    .login-box input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: 1px solid #b5d9ff;
      border-radius: 8px;
      background: white;
      color: #333;
      font-size: 15px;
    }

    .login-box input::placeholder {
      color: #666;
    }

    .login-box button {
      background: #1d4ed8; /* Royal blue button */
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: 0.3s ease;
    }

    .login-box button:hover {
      background: #153ea6; /* Darker royal blue */
    }

    .login-box .note {
      font-size: 13px;
      color: #555;
      margin-top: 15px;
    }

    .accent-line {
      width: 60px;
      height: 3px;
      background: #1d4ed8; /* royal blue accent */
      margin: 10px auto 20px auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Admin Login</h2>
    <div class="accent-line"></div>
    <form action="/admincheck" method="POST">
      <input type="text" name="aun" placeholder="Admin Username" required>
      <input type="password" name="ap" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p class="note">Only authorised administrators can access this panel.</p>
  </div>
</body>
</html>
